name: Build NetStream VPK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build NetStream
    runs-on: ubuntu-latest
    container:
      image: gnuton/vitasdk-docker:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git bash make

      - name: Install VitaSDK packages
        run: |
          vdpm taihen || echo "taihen install failed, continuing..."
          vdpm curl || echo "curl install failed, continuing..."

      - name: Install PAF component
        run: |
          cd /tmp
          git clone --depth=1 https://github.com/Princess-of-Sleeping/vitasdk-paf-component.git || exit 0
          cd vitasdk-paf-component
          chmod +x install.sh
          bash install.sh || echo "PAF install had issues, continuing..."

      - name: Create VDSuite compatibility headers
        run: |
          bash scripts/create_stub_headers.sh

      - name: Build NetStream
        run: |
          make clean || true
          make -j$(nproc) 2>&1 | tee build.log
          echo "Exit code: ${PIPESTATUS[0]}"

      - name: Upload VPK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NetStream-VPK
          path: "*.vpk"
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: build.log
          if-no-files-found: warn
