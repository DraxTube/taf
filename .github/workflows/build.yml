name: Build NetStream VPK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build NetStream
    runs-on: ubuntu-latest
    container:
      image: gnuton/vitasdk-docker:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends git bash curl tar xz-utils zip

      - name: Install VitaSDK packages
        run: |
          vdpm taihen || true
          vdpm curl || true

      - name: Install PAF component for VitaSDK
        run: |
          cd /tmp
          git clone --depth=1 https://github.com/Princess-of-Sleeping/vitasdk-paf-component.git
          cd vitasdk-paf-component
          chmod +x install.sh
          bash install.sh || true
          cd ..
          rm -rf vitasdk-paf-component

      - name: Install VDSuite SDK headers
        run: |
          # Download the VDSuite SDK from the official repo
          cd /tmp
          git clone --depth=1 https://github.com/Starter-psvita/Vita-Development-Suite.git vdsuite || \
          git clone --depth=1 https://github.com/babelshift/Vita-Development-Suite.git vdsuite || \
          echo "VDSuite repo not found, trying alternative sources..."

          # Try to find and install VDSuite headers
          if [ -d "vdsuite" ]; then
            # Copy VDSuite headers over VitaSDK
            find vdsuite -name "*.h" -path "*/include/*" | head -20
            if [ -d "vdsuite/target/include" ]; then
              cp -rvn vdsuite/target/include/* $VITASDK/arm-vita-eabi/include/ || true
            fi
            if [ -d "vdsuite/include" ]; then
              cp -rvn vdsuite/include/* $VITASDK/arm-vita-eabi/include/ || true
            fi
          fi

          # Also try the vdsuite-headers package if available
          cd /tmp
          git clone --depth=1 https://github.com/GrapheneCt/ScePaf-RE.git scepaf-re || true
          if [ -d "scepaf-re" ]; then
            find scepaf-re -name "*.h" | head -20
            if [ -d "scepaf-re/include" ]; then
              cp -rvn scepaf-re/include/* $VITASDK/arm-vita-eabi/include/ || true
            fi
          fi

          # Create stub headers for any missing VDSuite headers
          # These provide minimal definitions to allow compilation
          STUBDIR="$VITASDK/arm-vita-eabi/include"

          # kernel.h - Core PS Vita kernel types
          if [ ! -f "$STUBDIR/kernel.h" ]; then
            cat > "$STUBDIR/kernel.h" << 'HEADER'
          #ifndef _VDSUITE_KERNEL_H_
          #define _VDSUITE_KERNEL_H_
          #include <psp2/kernel/processmgr.h>
          #include <psp2/kernel/threadmgr.h>
          #include <psp2/kernel/sysmem.h>
          #include <psp2/kernel/modulemgr.h>
          #include <psp2/types.h>
          #include <stdint.h>
          #include <stddef.h>

          #define SCE_KERNEL_4KiB           (0x1000)
          #define SCE_KERNEL_16KiB          (0x4000)
          #define SCE_KERNEL_32KiB          (0x8000)
          #define SCE_KERNEL_64KiB          (0x10000)
          #define SCE_KERNEL_256KiB         (0x40000)
          #define SCE_KERNEL_512KiB         (0x80000)
          #define SCE_KERNEL_1MiB           (0x100000)
          #define SCE_KERNEL_2MiB           (0x200000)
          #define SCE_KERNEL_4MiB           (0x400000)
          #define SCE_KERNEL_8MiB           (0x800000)
          #define SCE_KERNEL_16MiB          (0x1000000)
          #define SCE_KERNEL_32MiB          (0x2000000)

          #ifndef SCE_OK
          #define SCE_OK 0
          #endif

          #define SCE_UID_INVALID_UID       ((SceUID)-1)
          #define SCE_KERNEL_PROCESS_ID_SELF 0

          #define SCE_KERNEL_CPU_MASK_USER_0 (1 << 16)
          #define SCE_KERNEL_CPU_MASK_USER_1 (1 << 17)
          #define SCE_KERNEL_CPU_MASK_USER_2 (1 << 18)

          #define SCE_KERNEL_HIGHEST_PRIORITY_USER        64
          #define SCE_KERNEL_DEFAULT_PRIORITY_USER        160
          #define SCE_KERNEL_COMMON_QUEUE_HIGHEST_PRIORITY 64
          #define SCE_KERNEL_INDIVIDUAL_QUEUE_HIGHEST_PRIORITY 64

          #define SCE_KERNEL_EVF_WAITMODE_OR   1

          #define SCE_KERNEL_MEMBLOCK_TYPE_USER_CDRAM_RW  0x09408060
          #define SCE_KERNEL_ALLOC_MEMBLOCK_ATTR_HAS_ALIGNMENT 0x00000004

          typedef struct SceKernelAllocMemBlockOpt {
              uint32_t size;
              uint32_t attr;
              uint32_t alignment;
              uint32_t uidBaseBlock;
              const char *strBaseBlockName;
              uint32_t flags;
              uint32_t reserved[10];
          } SceKernelAllocMemBlockOpt;

          #endif
          HEADER
          fi

          # libdbg.h
          if [ ! -f "$STUBDIR/libdbg.h" ]; then
            cat > "$STUBDIR/libdbg.h" << 'HEADER'
          #ifndef _VDSUITE_LIBDBG_H_
          #define _VDSUITE_LIBDBG_H_
          #include <stdio.h>

          #define SCE_DBG_LOG_LEVEL_TRACE 0
          #define SCE_DBG_LOG_COMPONENT

          #define SCE_DBG_LOG_TRACE(fmt, ...)
          #define SCE_DBG_LOG_INFO(fmt, ...)
          #define SCE_DBG_LOG_WARNING(fmt, ...)
          #define SCE_DBG_LOG_ERROR(fmt, ...)

          static inline void sceDbgSetMinimumLogLevel(int level) {}
          #endif
          HEADER
          fi

          # libsysmodule.h
          if [ ! -f "$STUBDIR/libsysmodule.h" ]; then
            cat > "$STUBDIR/libsysmodule.h" << 'HEADER'
          #ifndef _VDSUITE_LIBSYSMODULE_H_
          #define _VDSUITE_LIBSYSMODULE_H_
          #include <psp2/sysmodule.h>

          #define SCE_SYSMODULE_FIBER          0x0024
          #define SCE_SYSMODULE_NET            0x0001
          #define SCE_SYSMODULE_NP             0x0012
          #define SCE_SYSMODULE_NP_TUS         0x002D
          #define SCE_SYSMODULE_BEISOBMF       0x8001
          #define SCE_SYSMODULE_BEMP2SYS       0x8002

          #define SCE_SYSMODULE_INTERNAL_BXCE                0x80000005
          #define SCE_SYSMODULE_INTERNAL_INI_FILE_PROCESSOR   0x80000006
          #define SCE_SYSMODULE_INTERNAL_COMMON_GUI_DIALOG    0x80000019

          static inline int sceSysmoduleLoadModuleInternal(int id) { return 0; }
          #endif
          HEADER
          fi

          # appmgr.h
          if [ ! -f "$STUBDIR/appmgr.h" ]; then
            cat > "$STUBDIR/appmgr.h" << 'HEADER'
          #ifndef _VDSUITE_APPMGR_H_
          #define _VDSUITE_APPMGR_H_
          #include <psp2/appmgr.h>
          #include <stdint.h>

          static inline int sceAppMgrGetIdByName(SceUID *pid, const char *name) { return -1; }
          static inline int sceAppMgrAppParamGetString(SceUID pid, int param, char *buf, int bufSize) { return 0; }
          #endif
          HEADER
          fi

          echo "=== Stub headers installed ==="
          ls -la $STUBDIR/kernel.h $STUBDIR/libdbg.h $STUBDIR/libsysmodule.h $STUBDIR/appmgr.h || true

      - name: Build NetStream
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          make clean || true
          make -j$(nproc) 2>&1 | tee build.log | tail -200
          echo "=== Build exit code: $? ==="

      - name: Upload VPK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NetStream-VPK
          path: "*.vpk"
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: build.log
          if-no-files-found: warn

      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NetStream-Build
          path: |
            *.elf
            eboot.bin
          if-no-files-found: warn
