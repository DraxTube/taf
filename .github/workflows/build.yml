name: Build NetStream VPK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build NetStream
    runs-on: ubuntu-latest
    container:
      image: gnuton/vitasdk-docker:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install additional VitaSDK packages
        run: |
          vdpm taihen
          vdpm curl
          vdpm libxml2

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd build
          make -j$(nproc) 2>&1 || true
          # If the build partially fails due to missing VDSuite-specific headers,
          # report which files compiled successfully
          echo "=== Build completed ==="

      - name: Upload VPK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NetStream-VPK
          path: build/*.vpk
          if-no-files-found: warn

      - name: Upload SELF artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NetStream-SELF
          path: build/*.self
          if-no-files-found: warn
